name: Deploy Frontend to Firebase Hosting

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'vite.config.js'
      - 'index.html'
      - 'firebase.json'
      - '.firebaserc'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: 'projects/903156424574/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'magnio-deploy@magnio-rtdb.iam.gserviceaccount.com'
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: magnio-rtdb
      
      - name: Deploy to Firebase Hosting
        run: |
          npx firebase-tools deploy \
            --only hosting \
            --project=magnio-rtdb \
            --non-interactive

name: Refresh Model Rankings

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 1'

jobs:
  benchmark-and-store:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install backend dependencies
        run: pip install -r api/requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: 'projects/903156424574/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'magnio-deploy@magnio-rtdb.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: magnio-rtdb

      - name: Load benchmark secrets
        run: |
          echo "MAGNIO_OPENROUTER_API_KEY=$(gcloud secrets versions access latest --secret=MAGNIO_OPENROUTER_API_KEY)" >> "$GITHUB_ENV"

      - name: Refresh rankings
        env:
          MAGNIO_CHAT_MODEL_RANKINGS_BACKEND: dual
          FIREBASE_DATABASE_URL: https://magnio-rtdb-default-rtdb.firebaseio.com/
        run: |
          python scripts/benchmark_openrouter_models.py \
            --categories technical business legal travel advisor \
            --candidate-count 5 \
            --min-prompt-count 2 \
            --min-win-rate-delta 0.05

      - name: Commit JSON snapshot if changed
        run: |
          if [ ! -f data/openrouter_model_rankings.json ]; then
            echo "No ranking snapshot generated"
            exit 0
          fi
          if git ls-files --error-unmatch data/openrouter_model_rankings.json >/dev/null 2>&1; then
            if git diff --quiet -- data/openrouter_model_rankings.json; then
              echo "No ranking changes to commit"
              exit 0
            fi
          else
            echo "Ranking snapshot is new; forcing add"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/openrouter_model_rankings.json
          if git diff --cached --quiet -- data/openrouter_model_rankings.json; then
            echo "No ranking changes to commit"
            exit 0
          fi
          git commit -m "Refresh model rankings snapshot"
          git push origin HEAD:main
